---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-model-cache
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.speaches.storage.modelCache }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speaches
  template:
    metadata:
      labels:
        app: speaches
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: validate-gpu
          image: nvidia/cuda:12.8.0-base-ubuntu22.04
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: "1"
          command:
            - sh
            - -c
            - |
              FREE=$(nvidia-smi --query-gpu=memory.free --format=csv,noheader,nounits | tr -d ' ')
              echo "GPU free VRAM: ${FREE} MiB (need {{ .Values.speaches.minFreeVRAM }} MiB)"
              if [ "$FREE" -lt {{ .Values.speaches.minFreeVRAM }} ]; then
                echo "Not enough free VRAM — will retry on a different slot"
                exit 1
              fi
              echo "GPU OK"
      containers:
        - name: speaches
          image: {{ .Values.speaches.image }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: WHISPER__MODEL
              value: {{ .Values.speaches.model }}
            - name: WHISPER__COMPUTE_TYPE
              value: {{ .Values.speaches.computeType }}
            - name: WHISPER__DEVICE
              value: cuda
            - name: STT_MODEL_TTL
              value: "-1"
          lifecycle:
            postStart:
              exec:
                command:
                  - python3
                  - -c
                  - |
                    import struct, urllib.request as ur, time, sys
                    model = "{{ .Values.speaches.model }}"
                    for _ in range(60):
                        try:
                            ur.urlopen("http://localhost:8000/health", timeout=2)
                            break
                        except Exception:
                            time.sleep(3)
                    wav = struct.pack('<4sI4s4sIHHIIHH4sI',
                        b'RIFF', 36, b'WAVE', b'fmt ', 16,
                        1, 1, 16000, 32000, 2, 16, b'data', 0)
                    boundary = b'warmup'
                    body = (b'--' + boundary + b'\r\n'
                        b'Content-Disposition: form-data; name="model"\r\n\r\n' +
                        model.encode() + b'\r\n'
                        b'--' + boundary + b'\r\n'
                        b'Content-Disposition: form-data; name="file"; filename="warmup.wav"\r\n'
                        b'Content-Type: audio/wav\r\n\r\n' + wav + b'\r\n'
                        b'--' + boundary + b'--\r\n')
                    req = ur.Request(
                        'http://localhost:8000/v1/audio/transcriptions',
                        data=body,
                        headers={'Content-Type': 'multipart/form-data; boundary=' + boundary.decode()},
                        method='POST',
                    )
                    try:
                        ur.urlopen(req, timeout=120)
                        print("warmup OK - model loaded into VRAM")
                    except Exception as e:
                        print(f"warmup failed: {e}", file=sys.stderr)
                        sys.exit(1)
          resources:
            {{- toYaml .Values.speaches.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import urllib.request, json, sys
                  try:
                      data = json.loads(urllib.request.urlopen("http://localhost:8000/v1/models", timeout=3).read())
                      sys.exit(0 if any(m["id"] == "{{ .Values.speaches.model }}" for m in data.get("data", [])) else 1)
                  except Exception:
                      sys.exit(1)
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: whisper-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  selector:
    app: speaches
  ports:
    - port: 8000
      targetPort: http
      name: http
  type: ClusterIP
