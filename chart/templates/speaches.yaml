---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-model-cache
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.speaches.storage.modelCache }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speaches
  template:
    metadata:
      labels:
        app: speaches
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: gpu.coining.it/most-free-gpu
                    operator: Exists
      containers:
        - name: speaches
          image: {{ .Values.speaches.image }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: WHISPER__MODEL
              value: {{ .Values.speaches.model }}
            - name: WHISPER__COMPUTE_TYPE
              value: {{ .Values.speaches.computeType }}
            - name: WHISPER__DEVICE
              value: cuda
            - name: STT_MODEL_TTL
              value: "-1"
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      curl -sf http://localhost:8000/health && break
                      sleep 3
                    done
                    MODEL_ID=$(python3 -c "import urllib.parse; print(urllib.parse.quote('{{ .Values.speaches.model }}', safe=''))")
                    curl -sf -X POST "http://localhost:8000/v1/models/${MODEL_ID}" && echo "model registered"
          resources:
            {{- toYaml .Values.speaches.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: whisper-model-cache

---
apiVersion: v1
kind: Service
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  selector:
    app: speaches
  ports:
    - port: 8000
      targetPort: http
      name: http
  type: ClusterIP
