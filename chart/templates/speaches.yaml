---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-model-cache
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.speaches.storage.modelCache }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speaches
  template:
    metadata:
      labels:
        app: speaches
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: speaches
          image: {{ .Values.speaches.image }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: WHISPER__MODEL
              value: {{ .Values.speaches.model }}
            - name: WHISPER__COMPUTE_TYPE
              value: {{ .Values.speaches.computeType }}
            - name: WHISPER__DEVICE
              value: cuda
          lifecycle:
            postStart:
              exec:
                command:
                  - python3
                  - -c
                  - |
                    import urllib.request, urllib.parse, json, time, sys
                    model = "{{ .Values.speaches.model }}"
                    for _ in range(60):
                        try:
                            urllib.request.urlopen("http://localhost:8000/health", timeout=2)
                            break
                        except Exception:
                            time.sleep(3)
                    try:
                        model_id = urllib.parse.quote(model, safe="")
                        req = urllib.request.Request(
                            f"http://localhost:8000/v1/models/{model_id}",
                            data=b"",
                            headers={"Content-Length": "0"},
                            method="POST",
                        )
                        urllib.request.urlopen(req, timeout=600)
                    except Exception as e:
                        print(f"model registration error (non-fatal): {e}", file=sys.stderr)
                    sys.exit(0)
          resources:
            {{- toYaml .Values.speaches.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import urllib.request, json, sys
                  try:
                      data = json.loads(urllib.request.urlopen("http://localhost:8000/v1/models", timeout=3).read())
                      sys.exit(0 if any(m["id"] == "{{ .Values.speaches.model }}" for m in data.get("data", [])) else 1)
                  except Exception:
                      sys.exit(1)
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: whisper-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  selector:
    app: speaches
  ports:
    - port: 8000
      targetPort: http
      name: http
  type: ClusterIP
