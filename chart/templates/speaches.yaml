---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-model-cache
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.speaches.storage.modelCache }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speaches
  template:
    metadata:
      labels:
        app: speaches
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - comfyui
                topologyKey: nvidia.com/gpu.uuid
      initContainers:
        - name: validate-gpu
          image: nvidia/cuda:12.8.0-base-ubuntu22.04
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: warmup
              mountPath: /warmup
          command:
            - bash
            - -c
            - |
              FREE=$(nvidia-smi --query-gpu=memory.free --format=csv,noheader,nounits | tr -d ' ')
              echo "GPU free VRAM: ${FREE} MiB (need {{ .Values.speaches.minFreeVRAM }} MiB)"
              if [ "$FREE" -lt {{ .Values.speaches.minFreeVRAM }} ]; then
                echo "Not enough free VRAM — will retry on a different slot"
                exit 1
              fi
              echo "GPU OK"
              printf '\x52\x49\x46\x46\x24\x00\x00\x00\x57\x41\x56\x45\x66\x6d\x74\x20\x10\x00\x00\x00\x01\x00\x01\x00\x80\x3e\x00\x00\x00\x7d\x00\x00\x02\x00\x10\x00\x64\x61\x74\x61\x00\x00\x00\x00' > /warmup/warmup.wav
              echo "warmup.wav written ($(wc -c < /warmup/warmup.wav) bytes)"
      containers:
        - name: speaches
          image: {{ .Values.speaches.image }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: WHISPER__MODEL
              value: {{ .Values.speaches.model }}
            - name: WHISPER__COMPUTE_TYPE
              value: {{ .Values.speaches.computeType }}
            - name: WHISPER__DEVICE
              value: cuda
            - name: STT_MODEL_TTL
              value: "-1"
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      curl -sf http://localhost:8000/health && break
                      sleep 3
                    done
                    MODEL_ID=$(python3 -c "import urllib.parse; print(urllib.parse.quote('{{ .Values.speaches.model }}', safe=''))")
                    curl -sf -X POST "http://localhost:8000/v1/models/${MODEL_ID}" && echo "model registered"
          resources:
            {{- toYaml .Values.speaches.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: warmup
              mountPath: /warmup
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: whisper-model-cache
        - name: warmup
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: speaches
  namespace: {{ .Values.namespace }}
  labels:
    app: speaches
spec:
  selector:
    app: speaches
  ports:
    - port: 8000
      targetPort: http
      name: http
  type: ClusterIP
